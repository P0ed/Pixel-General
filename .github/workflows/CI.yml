name: CI

on:
  [push]

jobs:
  build:
    name: Build and test using xcodebuild command
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build
        run: xcodebuild -scheme PG build
      - name: Test
        run: xcodebuild -scheme PG test
